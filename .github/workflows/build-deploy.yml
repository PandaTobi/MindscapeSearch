name: Build and deploy static site
on:
  push:
    branches: [main]
  workflow_dispatch:
permissions:
  contents: read
  pages: write
  id-token: write
concurrency:
  group: pages
  cancel-in-progress: true
jobs:
  build:
    runs-on: ubuntu-latest
    environment: github-pages
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-node@v4
        with: { node-version-file: .nvmrc, cache: npm }
      - name: Debug versions
        run: |
          node -v
          npm -v
      - run: npm ci
      - run: npm run ci
        env:
          NEXT_PUBLIC_BASE_PATH: /${{ github.event.repository.name }}
          # Drives canonical URLs, Open Graph tags, robots.txt, and sitemap.xml.
          # `github.repository_owner`.github.io is the Pages origin for a
          # project site; a CNAME/custom domain would override this.
          NEXT_PUBLIC_SITE_URL: https://${{ github.repository_owner }}.github.io
      - uses: actions/upload-pages-artifact@v3
        with: { path: out }
  deploy:
    needs: build
    runs-on: ubuntu-latest
    environment:
      name: github-pages
      url: ${{ steps.deployment.outputs.page_url }}
    steps:
      - id: deployment
        uses: actions/deploy-pages@v4
