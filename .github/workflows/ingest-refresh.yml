name: Monthly ingest refresh
on:
  schedule:
    - cron: "17 4 1 * *"
  workflow_dispatch:
permissions:
  contents: write
  pull-requests: write
jobs:
  ingest:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-node@v4
        with: { node-version-file: .nvmrc, cache: npm }
      - run: npm ci
      - run: npm run data:ingest
      - uses: peter-evans/create-pull-request@v7
        with:
          branch: automation/monthly-ingest
          title: "chore(content): monthly AMA ingest"
          commit-message: "chore(content): refresh AMA snapshots"
          body: "Automated content refresh. Review parser output before merge."
